<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#faf9f6" />
  <meta name="description" content="A minimalistic notes app with reminders &amp; P2P sync" />
  <title>minotes — minimal notes</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <!-- Preload PeerJS and QRCode from CDN -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
</head>
<body>

  <!-- ═══ Header ═══ -->
  <header class="app-header">
    <div class="header-left">
      <h1 class="app-logo">minotes</h1>
    </div>
    <div class="header-right">
      <button id="toggleSyncBtn" class="header-icon-btn" aria-label="Sync">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6"/><path d="M21.5 8A10 10 0 0 0 3.6 10.1"/><path d="M2.5 22v-6h6"/><path d="M2.5 16A10 10 0 0 0 20.4 13.9"/>
        </svg>
        <span id="syncDot" class="sync-dot"></span>
      </button>
      <button id="toggleRemindersBtn" class="header-icon-btn" aria-label="Reminders">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
        </svg>
        <span id="reminderBadge" class="badge"></span>
      </button>
      <button id="newNoteBtn" class="btn btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        New Note
      </button>
    </div>
  </header>

  <!-- ═══ Filter Bar ═══ -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
  </div>

  <!-- ═══ Notes Grid ═══ -->
  <main>
    <div id="notesGrid" class="notes-grid"></div>
  </main>

  <!-- ═══ Overlay ═══ -->
  <div id="overlay" class="overlay"></div>

  <!-- ═══ Reminder Panel ═══ -->
  <aside id="reminderPanel" class="slide-panel">
    <div class="panel-header">
      <h2>Reminders</h2>
      <button id="closeReminderPanel" class="btn-icon" aria-label="Close">&times;</button>
    </div>
    <div id="reminderList" class="reminder-list"></div>
  </aside>

  <!-- ═══ Sync Panel ═══ -->
  <aside id="syncPanel" class="slide-panel sync-panel">
    <div class="panel-header">
      <h2>Sync</h2>
      <button id="closeSyncPanel" class="btn-icon" aria-label="Close">&times;</button>
    </div>

    <div class="sync-section">
      <label class="sync-label">My Sync Phrase</label>
      <div class="sync-phrase-row">
        <input id="myPhrase" class="sync-phrase-input" type="text" readonly />
        <button id="copyPhraseBtn" class="btn btn-secondary" title="Copy phrase">📋</button>
        <button id="regeneratePhraseBtn" class="btn btn-secondary" title="Generate new phrase">🔄</button>
      </div>
    </div>

    <div id="qrContainer" class="qr-container">
      <div class="qr-placeholder">Generate a phrase above to show QR</div>
    </div>

    <div class="sync-divider"><span>or</span></div>

    <div class="sync-section">
      <label class="sync-label">Connect to Peer</label>
      <div class="sync-phrase-row">
        <input id="peerPhrase" class="sync-phrase-input" type="text" placeholder="Enter peer's phrase…" />
        <button id="connectBtn" class="btn btn-primary">Connect</button>
      </div>
    </div>

    <div id="syncStatus" class="sync-status">
      <span class="sync-status-dot offline"></span>
      <span>Not connected</span>
    </div>

    <div id="syncPeers" class="sync-peers"></div>
  </aside>

  <!-- ═══ Modal ═══ -->
  <div id="noteModal" class="modal">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content" id="modalContent">
      <div class="modal-header">
        <div class="modal-colors">
          <span class="color-dot active" data-color="#ffffff" style="background:#e8e6e1;border:1px solid #d4d2cb"></span>
          <span class="color-dot" data-color="#fef3c7" style="background:#fef3c7"></span>
          <span class="color-dot" data-color="#dbeafe" style="background:#dbeafe"></span>
          <span class="color-dot" data-color="#fce7f3" style="background:#fce7f3"></span>
          <span class="color-dot" data-color="#dcfce7" style="background:#dcfce7"></span>
          <span class="color-dot" data-color="#f5d6c6" style="background:#f5d6c6"></span>
        </div>
        <button id="closeModal" class="btn-icon">&times;</button>
      </div>

      <input id="noteTitle" class="modal-title" type="text" placeholder="Title…" maxlength="100" autocomplete="off" />

      <textarea id="noteContent" class="modal-textarea" placeholder="Start writing…" rows="8"></textarea>

      <div class="modal-section">
        <div class="reminder-presets">
          <button class="preset-btn" data-minutes="60">1h</button>
          <button class="preset-btn" data-minutes="180">3h</button>
          <button class="preset-btn" data-minutes="1440">Tomorrow</button>
          <button class="preset-btn" data-minutes="10080">Next week</button>
          <input id="remindAt" class="preset-datetime" type="datetime-local" />
          <button id="clearReminderBtn" class="btn-icon" title="Clear reminder">&times;</button>
        </div>
      </div>

      <div class="modal-footer">
        <div class="modal-footer-left">
          <label class="done-toggle">
            <input type="checkbox" id="doneToggle" />
            <span class="done-checkbox"></span>
            <span class="done-label">Mark as done</span>
          </label>
        </div>
        <div class="modal-footer-actions">
          <button id="deleteNoteBtn" class="btn btn-danger" style="display:none">Delete</button>
          <button id="saveNoteBtn" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Toast Container ═══ -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- ═══ Scripts ═══ -->
  <script src="js/app.js"></script>
</body>
</html>

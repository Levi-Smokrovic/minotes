<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>minotes — minimal notes</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#faf9f6" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
  <!-- PeerJS for P2P sync -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js" defer></script>
  <!-- QRCode.js for QR codes -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
</head>
<body>
  <!-- ─── Header ─── -->
  <header class="header">
    <div class="header-inner">
      <h1 class="logo">minotes</h1>
      <div class="header-actions">
        <button class="btn btn-ghost" id="toggleSyncBtn" title="Sync">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg>
          <span class="sync-dot" id="syncDot"></span>
        </button>
        <button class="btn btn-ghost" id="toggleRemindersBtn" title="Reminders">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
          <span class="badge" id="reminderBadge" style="display:none">0</span>
        </button>
        <button class="btn btn-primary" id="newNoteBtn">+ New Note</button>
      </div>
    </div>
  </header>

  <!-- ─── Sync Panel ─── -->
  <aside class="sync-panel" id="syncPanel">
    <div class="sync-panel-header">
      <h2>🔗 Sync</h2>
      <button class="btn btn-icon" id="closeSyncPanel">&times;</button>
    </div>
    <div class="sync-body">
      <p class="sync-desc">Connect your other devices privately — no cloud needed.</p>

      <!-- Generate / Show my phrase -->
      <div class="sync-section">
        <label class="sync-label">Your Sync Phrase</label>
        <div class="sync-phrase-row">
          <input type="text" class="sync-phrase-input" id="myPhrase" readonly spellcheck="false" />
          <button class="btn btn-sm btn-primary" id="copyPhraseBtn">Copy</button>
          <button class="btn btn-sm btn-ghost" id="regeneratePhraseBtn">↻</button>
        </div>
      </div>

      <div class="sync-divider"><span>or</span></div>

      <!-- Connect to another phrase -->
      <div class="sync-section">
        <label class="sync-label">Connect to a phrase</label>
        <div class="sync-phrase-row">
          <input type="text" class="sync-phrase-input" id="peerPhrase" placeholder="Paste a sync phrase…" spellcheck="false" />
          <button class="btn btn-sm btn-primary" id="connectBtn">Connect</button>
        </div>
      </div>

      <!-- QR code -->
      <div class="sync-section">
        <label class="sync-label">Scan QR</label>
        <div class="qr-container" id="qrContainer">
          <div class="qr-placeholder">Generate a phrase above to show QR</div>
        </div>
      </div>

      <!-- Status & peers -->
      <div class="sync-status" id="syncStatus">
        <span class="sync-status-dot offline"></span>
        <span>Not connected</span>
      </div>
      <div class="sync-peers" id="syncPeers"></div>
    </div>
  </aside>

  <!-- ─── Reminder Panel ─── -->
  <aside class="reminder-panel" id="reminderPanel">
    <div class="reminder-panel-header">
      <h2>⏰ Reminders</h2>
      <button class="btn btn-icon" id="closeReminderPanel">&times;</button>
    </div>
    <div class="reminder-list" id="reminderList">
      <p class="empty-reminders">No upcoming reminders.</p>
    </div>
  </aside>

  <!-- ─── Overlay ─── -->
  <div class="overlay" id="overlay"></div>

  <!-- ─── Filter bar ─── -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
  </div>

  <!-- ─── Main Grid ─── -->
  <main class="grid" id="notesGrid">
    <p class="empty-state" id="emptyState">
      <span class="empty-icon">~</span><br/>
      No notes yet.<br/>
      <span class="empty-sub">Click <strong>+ New Note</strong> to start.</span>
    </p>
  </main>

  <!-- ─── Note Editor Modal ─── -->
  <div class="modal" id="noteModal">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content" id="modalContent">
      <div class="modal-header">
        <div class="color-picker">
          <button class="color-dot active" data-color="#ffffff" style="background:#ffffff;border:1.5px solid #ddd"></button>
          <button class="color-dot" data-color="#fef3c7" style="background:#fef3c7"></button>
          <button class="color-dot" data-color="#dbeafe" style="background:#dbeafe"></button>
          <button class="color-dot" data-color="#fce7f3" style="background:#fce7f3"></button>
          <button class="color-dot" data-color="#dcfce7" style="background:#dcfce7"></button>
          <button class="color-dot" data-color="#f5f5f4" style="background:#f5f5f4"></button>
        </div>
        <button class="btn btn-icon" id="closeModal">&times;</button>
      </div>
      <input type="text" class="modal-title" id="noteTitle" placeholder="Note title…" />
      <textarea class="modal-body" id="noteContent" placeholder="Write something…"></textarea>

      <!-- ─── Reminder presets ─── -->
      <div class="reminder-presets">
        <span class="reminder-presets-label">Remind me:</span>
        <button class="preset-btn" data-minutes="60">1h</button>
        <button class="preset-btn" data-minutes="180">3h</button>
        <button class="preset-btn" data-minutes="1440">Tomorrow</button>
        <button class="preset-btn" data-minutes="10080">Next week</button>
        <div class="preset-custom-wrap">
          <input type="datetime-local" id="remindAt" class="preset-datetime" />
          <button class="btn btn-sm btn-ghost" id="clearReminderBtn" title="Clear">✕</button>
        </div>
      </div>

      <div class="modal-footer">
        <div class="modal-footer-left">
          <label class="done-toggle" title="Mark as done">
            <input type="checkbox" id="doneToggle" />
            <span class="done-toggle-check">✓</span>
            <span>Done</span>
          </label>
        </div>
        <div class="modal-footer-actions">
          <button class="btn btn-ghost" id="deleteNoteBtn" style="color:#ef4444">Delete</button>
          <button class="btn btn-primary" id="saveNoteBtn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── Toast ─── -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ─── Notif permission prompt ─── -->
  <div class="notif-prompt" id="notifPrompt">
    <p>Enable notifications for reminders 🔔</p>
    <div class="notif-prompt-actions">
      <button class="btn btn-ghost" id="notifLaterBtn">Later</button>
      <button class="btn btn-primary" id="notifEnableBtn">Enable</button>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
